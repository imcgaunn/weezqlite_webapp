<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weezqlite</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js"></script>
  <style>
    body > header { background: var(--pico-color-indigo-950); }
    body > header nav { max-width: 1200px; margin: 0 auto; }
    body > header nav a,
    body > header nav strong { color: var(--pico-color-indigo-100); }
    body > header nav .db-label {
      font-size: 0.75rem;
      color: var(--pico-color-indigo-300);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 40ch;
    }
    main { max-width: 1200px; margin: 0 auto; }
    tbody td { overflow-wrap: break-word; max-width: 35ch; min-width: 3ch; }
    .badge {
      display: inline-block;
      padding: 0.1em 0.45em;
      border-radius: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      vertical-align: middle;
    }
    .badge-pk   { background: var(--pico-color-blue-100);  color: var(--pico-color-blue-700); }
    .badge-type { background: var(--pico-color-zinc-100);  color: var(--pico-color-zinc-600); }
    .null-val   { color: var(--pico-muted-color); font-style: italic; }
    textarea    { font-family: var(--pico-font-family-monospace) !important; }

    /* Sortable column headers */
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable a { color: inherit; text-decoration: none; display: block; padding-right: 1.2em; }
    th.sort-asc  a::after { content: ' ▲'; font-size: 0.7em; opacity: 0.7; }
    th.sort-desc a::after { content: ' ▼'; font-size: 0.7em; opacity: 0.7; }

    /* Column resize handle */
    th { position: relative; }
    .col-resize-handle {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 5px; cursor: col-resize; background: transparent;
    }
    .col-resize-handle:hover,
    .col-resize-handle.resizing { background: var(--pico-primary-hover); opacity: 0.5; }

    /* Datetime cell — prevent wrapping of formatted value */
    .ts-val { white-space: nowrap; }

    /* Flash green when a cell value is copied */
    td.copied { background: var(--pico-color-green-100) !important; }

    /* Inline page-size dropdown */
    .page-size-select {
      display: inline-block; width: auto;
      padding: 0.15rem 0.4rem; margin: 0; font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><strong>weezqlite</strong></li>
      </ul>
      <ul id="main-nav-links">
        <li><a href="#home">Open Database</a></li>
      </ul>
    </nav>
  </header>
  <main id="app" class="container">
    <p aria-busy="true">Loading…</p>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
